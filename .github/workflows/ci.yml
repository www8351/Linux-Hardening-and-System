name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      # --frozen enforces uv.lock. Without it CI could silently resolve different versions
      # than the lockfile pins, which makes the lockfile decorative (OSSYS-SEC-016).
      - name: Sync dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # No path argument: use the `files` setting in pyproject.toml so CI checks exactly what
      # a developer checks locally. Previously CI ran `mypy src` while the config said
      # ["src", "tests"], so tests were type-checked locally but not in CI.
      - name: Mypy (strict)
        run: uv run python -m mypy

      - name: Tests + coverage gate
        run: uv run python -m pytest -q --cov=ossys --cov-report=term-missing --cov-fail-under=80

      # Verifies the package installs standalone and the entrypoint resolves. `python -m`
      # is used for the smoke test because it does not depend on the console script shim.
      - name: Build and install check
        run: |
          uv build
          uv run --isolated --with dist/*.whl python -m ossys version

      - name: Shellcheck the wrappers
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/menu.sh scripts/ossys-run.sh deploy/install-endpoint.sh

      # The checkup must pass on a stock GitHub runner. This is the same command the
      # deployment gate runs on a real endpoint, so a regression in preflight logic breaks
      # CI rather than surfacing at 03:00 on a production host.
      - name: Endpoint checkup
        run: uv run python -m ossys --json check

      # Proves the Phase 4 contract end to end against a real installed entry point, not a
      # test double: mount, invoke, propagate exit 40, and honour the allow-list. --no-deps
      # is deliberate — the example declares `ossys` as a dependency for realism, and
      # resolving it would fetch an unrelated package of that name from PyPI.
      - name: Plugin integration
        run: |
          set -euo pipefail

          # Capture an exit code without -e aborting the step.
          rc() { local c=0; "$@" >/dev/null 2>&1 || c=$?; echo "$c"; }

          uv pip install --no-deps -e examples/ossys-plugin-demo

          # Mounted, and reported in the inventory with its distribution.
          uv run python -m ossys --json plugins | grep -q '"loaded": true'

          # Invokable, and its output is exactly what the plugin produced.
          test "$(uv run python -m ossys demo hello ci)" = "hello, ci"

          # Exit 40 (idempotent no-op) propagates out through a plugin unchanged.
          test "$(rc uv run python -m ossys demo hello ci --already)" = "40"

          # Core validators still apply inside a plugin: a control character exits 10.
          test "$(rc uv run python -m ossys demo hello "$(printf 'a\nb')")" = "10"

          # The allow-list unmounts it: the subcommand stops existing (usage error, 2).
          printf '[defaults.plugins]\nallowlist = ["nothing"]\n' > /tmp/blocked.toml
          test "$(rc uv run python -m ossys --config /tmp/blocked.toml demo hello ci)" = "2"

  # The container is a disposable sandbox, which makes it the only place the privileged code
  # path can be exercised for real rather than against mocks. `useradd` genuinely runs here
  # and genuinely mutates /etc/passwd — inside a throwaway container, so nothing is at risk.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ossys:ci .

      - name: Unprivileged path (image default)
        run: |
          set -euo pipefail
          # Capture an exit code without -e aborting the step.
          rc() { local c=0; docker run --rm ossys:ci "$@" >/dev/null 2>&1 || c=$?; echo "$c"; }

          # The image must not run as root by default.
          test "$(docker run --rm --entrypoint id ossys:ci -un)" = "ossys"

          # ...so the checkup reports the unprivileged path.
          docker run --rm ossys:ci --json check | grep -q '"detail": "user'

          # A privileged command refuses cleanly here rather than failing halfway: exit 20.
          test "$(rc --mode user useradd alice)" = "20"

          # The exit taxonomy survives the container boundary.
          test "$(rc count 3)" = "0"
          test "$(rc count 0)" = "10"

      - name: Privileged path, executed for real inside the sandbox
        run: |
          set -euo pipefail

          # Root in a disposable container, genuinely creating a user and genuinely mutating
          # /etc/passwd. This is the code path every unit test mocks, run for real.
          docker run --rm --user root ossys:ci --mode root --json useradd alice \
            | grep -q '"created": true'

          # Idempotency against real system state rather than a stubbed pwd lookup: the
          # second run must be exit 40 (NOOP), not an error. --entrypoint is required because
          # the image's ENTRYPOINT is `ossys` itself.
          docker run --rm --user root --entrypoint /bin/sh ossys:ci -c '
            set -u
            ossys --mode root useradd alice >/dev/null
            ossys --mode root useradd alice >/dev/null; rc=$?
            test "$rc" -eq 40 || { echo "expected exit 40 on re-run, got $rc"; exit 1; }
            id alice >/dev/null || { echo "user was not actually created"; exit 1; }
          '

      - name: Image hygiene
        run: |
          set -euo pipefail
          # No build toolchain left in the final image.
          ! docker run --rm --user root --entrypoint /bin/sh ossys:ci -c 'command -v gcc'
          # No pip cache or wheel left behind.
          ! docker run --rm --user root --entrypoint /bin/sh ossys:ci -c 'ls /tmp/*.whl'
          # The tools the privileged path needs are present, as `ossys check` also asserts.
          docker run --rm --user root --entrypoint /bin/sh ossys:ci -c 'command -v useradd usermod'

  # Supply-chain audit is a separate job so a new CVE advisory does not block an unrelated
  # code change from being merged, while still being visible on every run.
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Audit dependencies
        run: uvx pip-audit --strict
